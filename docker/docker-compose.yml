version: "3.9"

# Deploys the standalone system-pulse-server with a persistent SQLite
# volume. The exact same database schema (and the same system-pulse-db
# crate) is used by the desktop app — copying the .db file between a
# server deployment and a desktop install just works.
#
# Usage:
#   cd system-pulse/
#   cp docker/.env.example docker/.env   # fill in JWT_SECRET, SERVER_ENC_KEY
#   docker compose -f docker/docker-compose.yml --env-file docker/.env up -d --build

services:
  server:
    build:
      context: ..              # repo root — Dockerfile copies crates/* from here
      dockerfile: docker/Dockerfile
    container_name: system_pulse_server
    restart: unless-stopped
    ports:
      - "${PORT:-8090}:8090"
    environment:
      HOST: 0.0.0.0
      PORT: 8090
      DATABASE_PATH: /data/system_pulse.db
      DATABASE_MAX_CONNECTIONS: "10"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-24}
      SERVER_ENC_KEY: ${SERVER_ENC_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      # Named volume — survives `docker compose down`, only removed with
      # `docker compose down -v`. This is the single file that holds every
      # user, server, and metric row.
      - sqlite_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8090/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  sqlite_data:
    driver: local
