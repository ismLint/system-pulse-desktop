version: "3.9"


services:
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: system_pulse_server
    restart: unless-stopped
    ports:
      - "${PORT:-8090}:8090"
    environment:
      HOST: 0.0.0.0
      PORT: 8090
      DATABASE_PATH: /data/system_pulse.db
      DATABASE_MAX_CONNECTIONS: "10"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-24}
      SERVER_ENC_KEY: ${SERVER_ENC_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      - sqlite_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8090/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  sqlite_data:
    driver: local
